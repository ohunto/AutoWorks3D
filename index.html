<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoWorks3D – Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family:'Inter',sans-serif; background:#0a0a0f; color:#fff; min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; overflow:hidden; position:relative;}
    
    .bg-glow {position:absolute; width:600px; height:600px; background:radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; animation:glow-pulse 6s ease-in-out infinite;}
    .bg-glow-2 {position:absolute; width:400px; height:400px; background:radial-gradient(circle, rgba(0,153,204,0.1) 0%, transparent 70%); top:30%; left:30%; pointer-events:none; animation:glow-pulse 8s ease-in-out infinite reverse;}
    
    .content {position:relative; z-index:1;}
    
    h1 {font-size:clamp(3rem,12vw,6rem); margin:0 0 15px 0; letter-spacing:4px; font-weight:900; background:linear-gradient(90deg,#00d4ff,#0099cc); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
    
    .tagline {font-size:clamp(1rem,4vw,1.4rem); font-weight:300; margin:0 0 10px 0; opacity:0.7; letter-spacing:6px; text-transform:uppercase; animation:fade-in 1s ease-out;}
    
    .divider {width:60px; height:2px; background:linear-gradient(90deg,transparent,#00d4ff,transparent); margin:40px auto; border-radius:2px; animation:expand 1.5s ease-out;}
    
    .buttons {display:flex; flex-wrap:wrap; justify-content:center; gap:16px; animation:fade-up 1s ease-out 0.3s both;}
    
    .btn {display:inline-flex; align-items:center; gap:10px; background:rgba(0,212,255,0.1); color:#00d4ff; padding:16px 36px; border-radius:50px; text-decoration:none; font-weight:600; font-size:clamp(0.9rem,3vw,1.1rem); border:1px solid rgba(0,212,255,0.3); backdrop-filter:blur(10px); transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
    .btn:hover {background:rgba(0,212,255,0.2); border-color:#00d4ff; transform:translateY(-3px); box-shadow:0 20px 40px rgba(0,212,255,0.2);}
    
    .btn-ebay {background:rgba(255,255,255,0.05); color:#fff; border-color:rgba(255,255,255,0.2);}
    .btn-ebay:hover {background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.4); box-shadow:0 20px 40px rgba(255,255,255,0.1);}
    
    @keyframes glow-pulse {0%,100%{opacity:1; transform:translate(-50%,-50%) scale(1);} 50%{opacity:0.5; transform:translate(-50%,-50%) scale(1.1);}}
    @keyframes fade-in {from {opacity:0; transform:translateY(-10px);} to {opacity:0.7; transform:translateY(0);}}
    @keyframes fade-up {from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);}}
    @keyframes expand {from {width:0; opacity:0;} to {width:60px; opacity:1;}}
    
    @media (max-width:600px) {.btn {padding:14px 28px;} .buttons {flex-direction:column; align-items:center;}}
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>
  
  <div class="content">
    <h1>AutoWorks3D</h1>
    <div class="tagline">Website Coming Soon</div>
    <div class="divider"></div>
    
    <div class="buttons">
      <a href="https://AutoWorks3D.etsy.com" class="btn">Shop on Etsy</a>
      <a href="https://www.ebay.com/usr/autoworks3d" class="btn btn-ebay">Shop on eBay</a>
    </div>
  </div>

</body>
</html>
